name: Build Windows exe

# On every push to main: build both exes on a real Windows runner and upload
# them as downloadable Actions artifacts.
#   * WebKioskGuard.exe     — embedded WebView2 window (Windows 10/11).
#   * WebKioskGuardAHK.exe  — AutoHotkey guard for the installed Chrome (runs on
#                             old Windows 7/8.1 too; no api-ms-win-* dependency).
# On a version tag (v*): publish a GitHub Release with both exes attached,
# giving a stable public download link (.../releases/latest).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # needed to create Releases

env:
  AHK_VERSION: 1.1.37.02

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- WebView2 (Python/PyInstaller) exe ----------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build WebView2 exe
        run: pyinstaller --noconfirm WebKioskGuard.spec

      # ---------- AutoHotkey (installed-Chrome guard) exe ----------
      - name: Build AutoHotkey exe
        shell: pwsh
        run: |
          $ver = "${{ env.AHK_VERSION }}"
          $zip = "AutoHotkey_$ver.zip"
          Invoke-WebRequest "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$ver/$zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath ahk_tool -Force
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $ahkArgs = @('/in','ahk\WebKioskGuard.ahk','/out','dist\WebKioskGuardAHK.exe','/base','ahk_tool\AutoHotkeyU32.exe')
          $p = Start-Process -FilePath "ahk_tool\Compiler\Ahk2Exe.exe" -ArgumentList $ahkArgs -Wait -PassThru -NoNewWindow
          # Ahk2Exe finishes writing the output slightly after it exits; poll for it.
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            if (Test-Path "dist\WebKioskGuardAHK.exe") { $ok = $true; break }
            Start-Sleep -Milliseconds 500
          }
          if (-not $ok) { throw "AHK compile failed (exit $($p.ExitCode))" }
          Write-Host "AHK exe built OK"

      # ---------- Stage configs next to the exes ----------
      - name: Stage configs and helpers
        shell: pwsh
        run: |
          Copy-Item config.json dist\config.json -Force
          Copy-Item ahk\config.ini dist\config.ini -Force
          Copy-Item ahk\install-autostart.bat dist\install-autostart.bat -Force
          Copy-Item ahk\uninstall-autostart.bat dist\uninstall-autostart.bat -Force
          Copy-Item ahk\setup-kiosk.bat dist\setup-kiosk.bat -Force
          Copy-Item ahk\undo-kiosk.bat dist\undo-kiosk.bat -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebKioskGuard-windows
          path: |
            dist/WebKioskGuard.exe
            dist/WebKioskGuardAHK.exe
            dist/config.json
            dist/config.ini
            dist/install-autostart.bat
            dist/uninstall-autostart.bat
            dist/setup-kiosk.bat
            dist/undo-kiosk.bat

      - name: Publish Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/WebKioskGuardAHK.exe dist/config.ini \
            dist/setup-kiosk.bat dist/undo-kiosk.bat \
            dist/install-autostart.bat dist/uninstall-autostart.bat \
            dist/WebKioskGuard.exe dist/config.json \
            --title "${{ github.ref_name }}" \
            --notes "Two builds:
          - **WebKioskGuardAHK.exe** — guards the Chrome already installed on the machine; runs on old Windows (7/8.1) too. Put config.ini beside it and set the url. Recommended if WebKioskGuard.exe reports a missing api-ms-win-*.dll.
          - **WebKioskGuard.exe** — self-contained embedded WebView2 window; needs Windows 10/11 with the Edge WebView2 Runtime. Put config.json beside it to set the url.

          Auto-start at login: keep **install-autostart.bat** in the same folder as the exe and double-click it (uninstall-autostart.bat removes it)."
