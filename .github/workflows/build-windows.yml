name: Build Windows exe

# On every push to main: build both exes on a real Windows runner and upload
# them as downloadable Actions artifacts.
#   * WebKioskGuard.exe     — embedded WebView2 window (Windows 10/11).
#   * WebKioskGuardAHK.exe  — AutoHotkey guard for the installed Chrome (runs on
#                             old Windows 7/8.1 too; no api-ms-win-* dependency).
# On a version tag (v*): publish a GitHub Release with both exes attached,
# giving a stable public download link (.../releases/latest).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # needed to create Releases

env:
  AHK_VERSION: 1.1.37.02

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- WebView2 (Python/PyInstaller) exe ----------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build WebView2 exe
        run: pyinstaller --noconfirm WebKioskGuard.spec

      # ---------- AutoHotkey (installed-Chrome guard) exe ----------
      - name: Build AutoHotkey exe
        shell: pwsh
        run: |
          $ver = "${{ env.AHK_VERSION }}"
          $zip = "AutoHotkey_$ver.zip"
          Invoke-WebRequest "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$ver/$zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath ahk_tool -Force
          & "ahk_tool\Compiler\Ahk2Exe.exe" /in "ahk\WebKioskGuard.ahk" /out "dist\WebKioskGuardAHK.exe" /base "ahk_tool\AutoHotkeyU32.exe"
          if (!(Test-Path "dist\WebKioskGuardAHK.exe")) { throw "AHK compile failed" }

      # ---------- Stage configs next to the exes ----------
      - name: Stage configs
        shell: pwsh
        run: |
          Copy-Item config.json dist\config.json -Force
          Copy-Item ahk\config.ini dist\config.ini -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebKioskGuard-windows
          path: |
            dist/WebKioskGuard.exe
            dist/WebKioskGuardAHK.exe
            dist/config.json
            dist/config.ini

      - name: Publish Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/WebKioskGuardAHK.exe dist/config.ini \
            dist/WebKioskGuard.exe dist/config.json \
            --title "${{ github.ref_name }}" \
            --notes "Two builds:
          - **WebKioskGuardAHK.exe** — guards the Chrome already installed on the machine; runs on old Windows (7/8.1) too. Put config.ini beside it and set the url. Recommended if WebKioskGuard.exe reports a missing api-ms-win-*.dll.
          - **WebKioskGuard.exe** — self-contained embedded WebView2 window; needs Windows 10/11 with the Edge WebView2 Runtime. Put config.json beside it to set the url."
