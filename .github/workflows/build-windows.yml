name: Build Windows exe

# On every push to main: build dist/WebKioskGuard.exe on a real Windows runner
# and upload it as a downloadable Actions artifact.
# On a version tag (v*): additionally publish a GitHub Release with the exe
# attached, giving a stable public download link (.../releases/latest).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # needed to create Releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build standalone exe
        run: |
          pyinstaller --onefile --noconsole `
            --name WebKioskGuard `
            --collect-all webview `
            --collect-all clr_loader `
            src\main.py

      - name: Bundle editable config next to exe
        run: copy config.json dist\config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebKioskGuard-windows
          path: |
            dist/WebKioskGuard.exe
            dist/config.json

      - name: Publish Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/WebKioskGuard.exe dist/config.json \
            --title "${{ github.ref_name }}" \
            --notes "Windows kiosk guard — download WebKioskGuard.exe and double-click to run. To change the URL, put config.json in the same folder and edit its url (or pass a URL on the command line). Requires the Edge WebView2 Runtime (preinstalled on Win11 / updated Win10)."
