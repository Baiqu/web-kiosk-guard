[kiosk]
; The website to display fullscreen in Chrome.
url=https://example.com

; Hidden exit hotkey. AutoHotkey syntax: ^ = Ctrl, ! = Alt, + = Shift, # = Win.
; Default ^!+q = Ctrl+Alt+Shift+Q.
exit_hotkey=^!+q

; How often (milliseconds) to re-assert always-on-top and check the window.
poll_ms=1000

; Full path to chrome.exe. Leave blank to auto-detect the installed Chrome.
chrome_path=

; Isolated Chrome profile folder (keeps the kiosk separate from normal Chrome).
; Leave blank to use a "chrome-kiosk-profile" folder next to this exe.
user_data_dir=

; 1 = block Alt+F4 / Ctrl+W close shortcuts. 0 = allow them (relaunch still guards).
block_close_keys=1

; Auto-refresh the page every N seconds so it picks up new server content.
; 0 = never auto-refresh. 1800 = every 30 minutes.
refresh_interval_sec=1800

; 1 = hard refresh (Ctrl+F5, ignore cache); 0 = normal refresh (F5).
refresh_hard=1

; Hide the mouse cursor while the kiosk runs (restored automatically on exit). 1/0.
hide_cursor=1

; Auto-update: download a newer WebKioskGuardAHK.exe from GitHub Releases and
; restart. Keep the exe in a writable folder (not Program Files) for this to work. 1/0.
auto_update=1

; How often (seconds) to check for an update; also checked once at startup.
; 86400 = once a day.
update_interval_sec=86400

; Keep the screen on and stop the PC sleeping while the kiosk runs (restored on
; exit). Doesn't touch system power settings. 1/0.
keep_awake=1
