[kiosk]
; The website to display fullscreen in Chrome.
url=https://example.com

; Hidden exit hotkey. AutoHotkey syntax: ^ = Ctrl, ! = Alt, + = Shift, # = Win.
; Default ^!+q = Ctrl+Alt+Shift+Q.
exit_hotkey=^!+q

; How often (milliseconds) to re-assert always-on-top and check the window.
poll_ms=1000

; Full path to chrome.exe. Leave blank to auto-detect the installed Chrome.
chrome_path=

; Isolated Chrome profile folder (keeps the kiosk separate from normal Chrome).
; Leave blank to use a "chrome-kiosk-profile" folder next to this exe.
user_data_dir=

; 1 = block Alt+F4 / Ctrl+W close shortcuts. 0 = allow them (relaunch still guards).
block_close_keys=1
